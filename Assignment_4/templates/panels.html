<!-- Osae-komi and injury timers sitting side by side (Ethan) -->
<div class="bottom-grid">

  <!-- pin hold timer — awards points automatically at 5s, 10s, and 20s -->
  <div class="panel">
    <div class="panel-title">🔒 Osae-Komi (Pin Hold)</div>
    <div id="ok-seconds">0s</div>
    <div class="progress-bar">
      <div class="progress-fill" id="ok-bar" style="width:0%"></div>
    </div>
    <!-- threshold labels so the referee knows whats coming -->
    <div style="display:flex; justify-content:space-between; font-size:0.65rem; color:#555;">
      <span>0s</span><span>5s Yuko</span><span>10s W-A</span><span>20s Ippon</span>
    </div>
    <div class="panel-btns">
      <!-- blue themed button for blue player -->
      <button class="btn" style="background:#1e3a5f; color:#60a5fa;" onclick="startOsaeKomi('a')">Blue Pin</button>
      <!-- white themed button for white player -->
      <button class="btn" style="background:#2a2a2a; color:#e0e0e0; border:1px solid #aaaaaa;" onclick="startOsaeKomi('b')">White Pin</button>
      <button class="btn btn-outline" onclick="stopOsaeKomi()">Stop</button>
      <button class="btn btn-outline" onclick="resetOsaeKomi()">Reset</button>
    </div>
  </div>

  <!-- injury timer — max allowed is 5 minutes per IJF rules -->
  <div class="panel">
    <div class="panel-title">🩹 Injury Time</div>
    <div id="injury-display">0:00</div>
    <div class="progress-bar">
      <div class="progress-fill" id="injury-bar" style="width:0%"></div>
    </div>
    <div style="text-align:right; font-size:0.65rem; color:#555;">max 5:00</div>
    <div class="panel-btns">
      <!-- blue themed button for blue player -->
      <button class="btn" style="background:#1e3a5f; color:#60a5fa;" onclick="startInjury('a')">Blue</button>
      <!-- white themed button for white player -->
      <button class="btn" style="background:#2a2a2a; color:#e0e0e0; border:1px solid #aaaaaa;" onclick="startInjury('b')">White</button>
      <button class="btn btn-outline" onclick="stopInjury()">Stop</button>
      <button class="btn btn-outline" onclick="resetInjury()">Reset</button>
    </div>
  </div>

</div>
