<!-- (Cassiddy) Here is the form where the referee types in player names and clubs before the match -->
<div class="setup-form">
  <div class="field">
    <label>Blue Player Name</label>
    <input id="pa-name" type="text" placeholder="Blue" />
  </div>
  <div class="field">
    <label>Blue Club</label>
    <input id="pa-club" type="text" placeholder="Club" />
  </div>
  <div class="field">
    <label>White Player Name</label>
    <input id="pb-name" type="text" placeholder="White" />
  </div>
  <div class="field">
    <label>White Club</label>
    <input id="pb-club" type="text" placeholder="Club" />
  </div>
  <button onclick="setPlayers()">Set Players</button>
</div>
