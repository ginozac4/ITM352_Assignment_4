<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Judo Tournament Bracket</title>
  <style>
    /* (Cassiddy) general page styling — dark theme to match the scoreboard */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    /* page header */
    header {
      text-align: center;
      padding: 16px 0 24px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #FFD600;
      letter-spacing: 0.1em;
    }
    header p {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* back to scoreboard link */
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #FFD600;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .back-link:hover { opacity: 0.8; }

    /* card style used throughout the page */
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #555;
      margin-bottom: 16px;
      font-weight: 700;
    }

    /* form inputs */
    input[type="text"] {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: white;
      padding: 8px 12px;
      font-size: 0.9rem;
      width: 200px;
    }

    /* buttons */
    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-yellow  { background: #FFD600; color: #111; }
    .btn-green   { background: #238636; color: white; }
    .btn-red     { background: #da3633; color: white; }
    .btn-outline { background: transparent; border: 1px solid #30363d; color: white; }

    /* small delete button used in lists */
    .btn-delete {
      padding: 4px 10px;
      background: #da3633;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-delete:hover { opacity: 0.8; }

    /* :D (brandon) form row layout */
    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }

    /* Under this point is tournament lists (Brandon) */
    .tournament-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.9rem;
      gap: 10px;
    }
    .tournament-item:last-child { border-bottom: none; }

    /* player list */
    .player-list {
      list-style: none;
      margin-bottom: 12px;
    }
    .player-list li {
      padding: 6px 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .player-list li:last-child { border-bottom: none; }

    /* bracket display */
    .bracket {
      display: flex;
      gap: 40px;
      overflow-x: auto;
      padding-bottom: 20px;
    }

    .round {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 220px;
    }

    .round-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #FFD600;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }

    /* individual match card in the bracket */
    .match-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }

    .match-player {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      border-bottom: 1px solid #21262d;
      cursor: pointer;
      transition: background 0.2s;
    }
    .match-player:last-child { border-bottom: none; }
    .match-player:hover { background: #161b22; }
    .match-player.winner { background: #1a3a1a; color: #4ade80; }
    .match-player.bye { color: #555; cursor: default; font-style: italic; }

    .match-player .club {
      font-size: 0.7rem;
      color: #555;
      font-weight: 400;
    }

    .match-footer {
      padding: 6px 14px;
      font-size: 0.65rem;
      color: #555;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .match-footer.confirmed { color: #4ade80; }

    /* champion display */
    .champion-banner {
      background: #FFD600;
      color: #111;
      text-align: center;
      padding: 20px;
      border-radius: 16px;
      font-size: 1.5rem;
      font-weight: 900;
      max-width: 900px;
      margin: 0 auto 20px;
      display: none;
    }

    /* status message */
    #status-msg {
      text-align: center;
      color: #555;
      font-size: 0.8rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <header>
    <h1>🥋 Tournament Bracket</h1>
    <p>JudoScore</p>
  </header>

  <div style="max-width:900px; margin:0 auto;">
    <a href="/" class="back-link">← Back to Scoreboard</a>
  </div>

  <!-- (Brandon) champion banner — shown when tournament is complete -->
  <div class="champion-banner" id="champion-banner"></div>

  <!-- step 1: create or select a tournament -->
  <div class="card">
    <h2>Step 1 — Create a Tournament</h2>
    <div class="form-row">
      <input type="text" id="tournament-name" placeholder="Tournament name" />
      <button class="btn btn-yellow" onclick="createTournament()">Create</button>
    </div>

    <h2 style="margin-top:16px;">Or Select an Existing Tournament</h2>
    <div id="tournament-list">
      <p style="color:#555; font-size:0.8rem;">Loading tournaments...</p>
    </div>
  </div>

  <!-- step 2: register players — shown after tournament is selected -->
  <div class="card" id="register-section" style="display:none;">
    <h2>Step 2 — Register Players</h2>
    <div class="form-row">
      <input type="text" id="player-name" placeholder="Player name" />
      <input type="text" id="player-club" placeholder="Club (optional)" />
      <button class="btn btn-green" onclick="registerPlayer()">Add Player</button>
    </div>
    <ul class="player-list" id="player-list"></ul>
    <button class="btn btn-yellow" onclick="startTournament()">Generate Bracket</button>
    <p id="status-msg"></p>
  </div>

  <!-- step 3: bracket display — shown after bracket is generated -->
  <div class="card" id="bracket-section" style="display:none;">
    <h2>Step 3 — Tournament Bracket</h2>
    <p style="font-size:0.75rem; color:#555; margin-bottom:16px;">
      Click a player's name to confirm them as the winner of that match.
    </p>
    <div class="bracket" id="bracket-display"></div>
    <button class="btn btn-outline" style="margin-top:16px;" onclick="loadBracket()">Refresh Bracket</button>
  </div>

  <script>
    // keeps track of which tournament we are currently working with
    let currentTournamentId = null;
    let currentParticipants = [];

    // loads the list of existing tournaments when the page opens
    function loadTournaments() {
      fetch('/tournament/list')
        .then(r => r.json())
        .then(data => {
          const list = document.getElementById('tournament-list');
          if (data.tournaments.length === 0) {
            list.innerHTML = '<p style="color:#555; font-size:0.8rem;">No tournaments yet — create one above!</p>';
            return;
          }
          // each tournament row now has a select button and a delete button
          list.innerHTML = data.tournaments.map(t => `
            <div class="tournament-item">
              <span>${t.name}</span>
              <div style="display:flex; gap:8px;">
                <button class="btn btn-outline" style="padding:6px 14px; font-size:0.75rem;"
                  onclick="selectTournament(${t.id}, '${t.name}')">Select</button>
                <button class="btn-delete"
                  onclick="deleteTournament(${t.id}, '${t.name}')">Delete</button>
              </div>
            </div>
          `).join('');
        });
    }

    // creates a brand new tournament in the database (Cassiddy)
    function createTournament() {
      const name = document.getElementById('tournament-name').value.trim();
      if (!name) { alert('Please enter a tournament name'); return; }

      fetch('/tournament/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          selectTournament(data.tournament_id, name);
          loadTournaments();
          document.getElementById('tournament-name').value = '';
        }
      });
    }

    // deletes a tournament and all its players and matches
    function deleteTournament(id, name) {
      if (!confirm(`Delete "${name}" and all its data? This cannot be undone.`)) return;

      fetch(`/tournament/${id}/delete`, {
        method: 'POST'
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          // if we deleted the currently selected tournament reset the page
          if (currentTournamentId === id) {
            currentTournamentId = null;
            document.getElementById('register-section').style.display = 'none';
            document.getElementById('bracket-section').style.display = 'none';
            document.getElementById('champion-banner').style.display = 'none';
          }
          loadTournaments();
        }
      });
    }

    // selects a tournament and shows the player registration section
    function selectTournament(id, name) {
      currentTournamentId = id;
      document.getElementById('register-section').style.display = 'block';
      document.getElementById('status-msg').textContent = `Selected: ${name}`;
      loadPlayers();
      loadBracket();
    }

    // loads existing players for the selected tournament (Ethan)
    function loadPlayers() {
      fetch(`/tournament/${currentTournamentId}/bracket`)
        .then(r => r.json())
        .then(data => {
          currentParticipants = data.participants;
          const list = document.getElementById('player-list');
          if (data.participants.length === 0) {
            list.innerHTML = '<li style="color:#555;">No players registered yet</li>';
            return;
          }
          // each player row now has a delete button next to their name
          list.innerHTML = data.participants.map(p => `
            <li>
              <span>${p.name} <span style="color:#555; font-size:0.75rem;">${p.club || ''}</span></span>
              <button class="btn-delete" onclick="deletePlayer(${p.id})">Remove</button>
            </li>
          `).join('');
        });
    }

    // removes a player from the tournament
    function deletePlayer(playerId) {
      if (!confirm('Remove this player from the tournament?')) return;

      fetch(`/tournament/player/${playerId}/delete`, {
        method: 'POST'
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          loadPlayers();
        }
      });
    }

    // adds a new player to the tournament
    function registerPlayer() {
      const name = document.getElementById('player-name').value.trim();
      const club = document.getElementById('player-club').value.trim();
      if (!name) { alert('Please enter a player name'); return; }

      fetch(`/tournament/${currentTournamentId}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, club })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          document.getElementById('player-name').value = '';
          document.getElementById('player-club').value = '';
          loadPlayers();
        }
      });
    }

    // generates the bracket from all registered players
    function startTournament() {
      fetch(`/tournament/${currentTournamentId}/start`, {
        method: 'POST'
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          alert(data.error);
          return;
        }
        loadBracket();
        document.getElementById('bracket-section').style.display = 'block';
      });
    }

    // loads and displays the full bracket
    function loadBracket() {
      if (!currentTournamentId) return;

      fetch(`/tournament/${currentTournamentId}/bracket`)
        .then(r => r.json())
        .then(data => {
          currentParticipants = data.participants;
          const matches = data.matches;

          if (matches.length === 0) return;

          document.getElementById('bracket-section').style.display = 'block';

          // group matches by round number (Ethan)
          const rounds = {};
          matches.forEach(m => {
            if (!rounds[m.round_number]) rounds[m.round_number] = [];
            rounds[m.round_number].push(m);
          });

          // check if there is a champion
          // only announce when the last round has exactly 1 match
          // that match is confirmed, has a winner, and is not a bye
          // this prevents early champion announcements during the bracket (Brandon)
          const lastRound = Math.max(...Object.keys(rounds).map(Number));
          const lastRoundMatches = rounds[lastRound];
          const finalMatch = lastRoundMatches[0];
          if (
            finalMatch &&
            finalMatch.confirmed &&
            finalMatch.winner_name &&
            !finalMatch.is_bye &&
            lastRoundMatches.length === 1
          ) {
            const banner = document.getElementById('champion-banner');
            banner.textContent = `🏆 Tournament Champion: ${finalMatch.winner_name}`;
            banner.style.display = 'block';
          } else {
            // hide the banner if conditions are not met yet
            document.getElementById('champion-banner').style.display = 'none';
          }

          // build the bracket HTML round by round
          const bracketEl = document.getElementById('bracket-display');
          bracketEl.innerHTML = Object.keys(rounds).sort((a, b) => a - b).map(roundNum => {
            const roundMatches = rounds[roundNum];
            const totalRounds = Object.keys(rounds).length;
            const roundLabel = roundNum == totalRounds ? 'Final'
              : roundNum == totalRounds - 1 ? 'Semi-Final'
              : `Round ${roundNum}`;

            return `
              <div class="round">
                <div class="round-title">${roundLabel}</div>
                ${roundMatches.map(m => buildMatchCard(m)).join('')}
              </div>
            `;
          }).join('');
        });
    }

    // builds the HTML for one match card in the bracket (Ethan)
    function buildMatchCard(match) {
      const playerA = match.is_bye && !match.player_a_name ? null : match.player_a_name;
      const playerB = match.is_bye && !match.player_b_name ? null : match.player_b_name;

      const aClass = match.winner_name === match.player_a_name ? 'winner' : (playerA ? '' : 'bye');
      const bClass = match.winner_name === match.player_b_name ? 'winner' : (playerB ? '' : 'bye');

      const aClick = !match.confirmed && playerA
        ? `onclick="confirmWinner(${match.id}, ${match.player_a_id})"`
        : '';
      const bClick = !match.confirmed && playerB
        ? `onclick="confirmWinner(${match.id}, ${match.player_b_id})"`
        : '';

      return `
        <div class="match-card">
          <div class="match-player ${aClass}" ${aClick}>
            <span>${playerA || 'BYE'}</span>
            <span class="club">${match.player_a_club || ''}</span>
          </div>
          <div class="match-player ${bClass}" ${bClick}>
            <span>${playerB || 'BYE'}</span>
            <span class="club">${match.player_b_club || ''}</span>
          </div>
          <div class="match-footer ${match.confirmed ? 'confirmed' : ''}">
            ${match.confirmed ? '✓ Confirmed' : match.is_bye ? 'BYE' : 'Click player to confirm winner'}
          </div>
        </div>
      `;
    }

    // confirms the winner of a match and refreshes the bracket
    function confirmWinner(matchId, winnerId) {
      if (!confirm('Confirm this player as the winner?')) return;

      fetch(`/tournament/match/${matchId}/confirm`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ winner_id: winnerId })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          loadBracket();
        }
      });
    }

    // load tournaments when page opens (Cassiddy)
    loadTournaments();
  </script>

</body>
</html>
